apiVersion: networking.k8s.io/v1
kind: Ingress

metadata:
  name: production-app-ingress
  namespace: production

spec:
  ingressClassName: nginx

  rules:
  - http:
      paths:
      - path: /
        pathType: Prefix

        backend:
          service:
            name: production-app-service

            port:
              number: 80
