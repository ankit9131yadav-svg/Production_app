apiVersion: apps/v1
kind: Deployment

metadata:
  name: production-app
  namespace: {{ .Values.namespace }}

spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
  type: RollingUpdate

  rollingUpdate:
    maxUnavailable: 1
    maxSurge: 1

  selector:
    matchLabels:
      app: production-app

  template:
    metadata:
      labels:
        app: production-app

    spec:
      containers:
      - name: production-app

        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"

        imagePullPolicy: Always

        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: {{ .Values.resources.requests.cpu }}
            memory: {{ .Values.resources.requests.memory }}

          limits:
            cpu: {{ .Values.resources.limits.cpu }}
            memory: {{ .Values.resources.limits.memory }}
          livenessProbe:
            httpGet:
            path: / 
            port: 80

            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            httpGet:
            path: /
            port: 80

            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3

        envFrom:
        - configMapRef:
            name: production-app-config

        - secretRef:
            name: production-app-secret
