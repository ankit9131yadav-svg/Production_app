apiVersion: networking.k8s.io/v1
kind: Ingress

metadata:
  name: production-app-ingress
  namespace: {{ .Values.namespace }}

spec:
  ingressClassName: nginx

  rules:
  - http:
      paths:
      - path: /
        pathType: Prefix

        backend:
          service:
            name: production-app-service
            port:
              number: {{ .Values.service.port }}
