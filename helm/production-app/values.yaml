namespace: production

replicaCount: 3

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"

  limits:
    cpu: "500m"
    memory: "512Mi"

image:
  repository: ankit9131/production-app
  tag: latest

service:
  type: NodePort
  port: 80
  targetPort: 80

config:
  APP_ENV: production
  APP_NAME: Production DevOps Platform
  APP_PORT: "80"

secret:
  DB_USERNAME: admin
  DB_PASSWORD: password123
  API_KEY: devops-secret-key
